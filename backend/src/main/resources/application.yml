spring:
  application:
    name: aegisnet-core

  datasource:
    url: jdbc:postgresql://localhost:5432/aegisnet
    username: aegis_user
    password: aegis_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisDialect
        format_sql: true
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

  ai:
    vertex:
      ai:
        gemini:
          project-id: ${GCP_PROJECT_ID:mock-project-id}
          location: ${GCP_LOCATION:us-central1}
          model: gemini-1.5-pro

server:
  port: 8080

logging:
  level:
    com.aegisnet: DEBUG
