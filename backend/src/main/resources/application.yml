spring:
  application:
    name: aegisnet-core

  datasource:
    url: jdbc:h2:mem:aegisnet;DB_CLOSE_DELAY=-1
    username: sa
    password: 
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: false

  task:
    scheduling:
      pool:
        size: 8

server:
  port: 8080

logging:
  level:
    com.aegisnet: INFO
    com.aegisnet.core.service.OpenMeteoService: DEBUG
    com.aegisnet.core.service.GdacsService: INFO
    com.aegisnet.core.service.GdeltService: INFO
