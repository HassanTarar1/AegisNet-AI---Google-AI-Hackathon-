version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: aegisnet-db
    environment:
      POSTGRES_USER: aegis_user
      POSTGRES_PASSWORD: aegis_password
      POSTGRES_DB: aegisnet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aegisnet-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
